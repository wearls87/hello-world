      m.ct==="rank"&&React.createElement(RankCard, null),
      m.ct==="alert"&&React.createElement(AlertCard, null),
      m.ct==="upcoming"&&React.createElement(UpcomingCard, null)
    );

  return React.createElement('div', {style:{display:"flex",flexDirection:"column",height:"100vh",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"#1e293b"}},

      React.createElement('div', {style:{width:34,height:34,borderRadius:"50%",background:"#4f46e5",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14}}, "PS"),

    React.createElement('div', {style:{flex:1,overflow:"auto",padding:20,display:"flex",flexDirection:"column",gap:12,maxWidth:700,margin:"0 auto",width:"100%"}},
